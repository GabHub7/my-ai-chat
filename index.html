<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>g.ai</title>
  <style>
    :root {
      --bg: #f0f6ff;
      --container-bg: #ffffff;
      --header-from: #4fa3e0;
      --header-to: #2979c8;
      --msg-ai-bg: #e8f1fb;
      --msg-ai-border: #c2d9f5;
      --msg-ai-color: #1a2a3a;
      --msg-user-from: #4fa3e0;
      --msg-user-to: #2979c8;
      --input-bg: #f0f6ff;
      --input-border: #b3d1f0;
      --input-color: #1a2a3a;
      --input-area-bg: #e8f1fb;
      --placeholder: #7a9fc0;
      --shadow: rgba(41,121,200,0.15);
      --send-from: #4fa3e0;
      --send-to: #2979c8;
      --powered: rgba(255,255,255,0.75);
      --sidebar-bg: #e0efff;
      --sidebar-item: #ffffff;
      --sidebar-item-hover: #cce0ff;
      --sidebar-active: #2979c8;
      --sidebar-text: #1a2a3a;
      --sidebar-sub: #5a8ab0;
      --divider: #c2d9f5;
    }

    [data-theme="dark"] {
      --bg: #0a0f1e;
      --container-bg: #0f1a2e;
      --header-from: #0d2a4a;
      --header-to: #091828;
      --msg-ai-bg: #0d1f35;
      --msg-ai-border: #1a3a5c;
      --msg-ai-color: #cce0f5;
      --msg-user-from: #1a4a7a;
      --msg-user-to: #0d2a4a;
      --input-bg: #0a0f1e;
      --input-border: #1a3a5c;
      --input-color: #cce0f5;
      --input-area-bg: #0d1a2e;
      --placeholder: #3a6a9a;
      --shadow: rgba(0,80,180,0.3);
      --send-from: #1a4a7a;
      --send-to: #0d2a4a;
      --powered: rgba(150,200,255,0.5);
      --sidebar-bg: #080f1c;
      --sidebar-item: #0d1a2e;
      --sidebar-item-hover: #0f2040;
      --sidebar-active: #1a4a7a;
      --sidebar-text: #cce0f5;
      --sidebar-sub: #4a7a9a;
      --divider: #1a3a5c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--input-color);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .app-wrapper {
      width: 100%;
      max-width: 900px;
      height: 100vh;
      display: flex;
      overflow: hidden;
      box-shadow: 0 0 40px var(--shadow);
    }

    @media (min-width: 768px) {
      .app-wrapper { height: 90vh; border-radius: 16px; }
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--divider);
      transition: background 0.3s, transform 0.3s;
      flex-shrink: 0;
    }

    .sidebar.hidden { display: none; }

    @media (max-width: 600px) {
      .sidebar {
        position: absolute;
        left: 0; top: 0;
        height: 100%;
        z-index: 100;
        width: 220px;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); }
      .app-wrapper { max-width: 100%; }
    }

    .sidebar-header {
      padding: 14px 12px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--sidebar-text);
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .new-chat-btn {
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .new-chat-btn:hover { opacity: 0.85; }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--divider); border-radius: 3px; }

    .chat-item {
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      background: var(--sidebar-item);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .chat-item:hover { background: var(--sidebar-item-hover); }
    .chat-item.active { background: var(--sidebar-active); }
    .chat-item.active .chat-item-title { color: #fff; }
    .chat-item.active .chat-item-date { color: rgba(255,255,255,0.6); }

    .chat-item-info { flex: 1; overflow: hidden; }

    .chat-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--sidebar-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-date {
      font-size: 10px;
      color: var(--sidebar-sub);
      margin-top: 2px;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s;
      padding: 2px 4px;
      border-radius: 4px;
      color: var(--sidebar-text);
    }

    .chat-item:hover .delete-btn { opacity: 0.5; }
    .delete-btn:hover { opacity: 1 !important; }

    .sidebar-footer {
      padding: 10px 12px;
      border-top: 1px solid var(--divider);
      font-size: 10px;
      color: var(--sidebar-sub);
      text-align: center;
    }

    /* MAIN CHAT */
    .chat-container {
      flex: 1;
      background: var(--container-bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background 0.3s;
      min-width: 0;
    }

    .chat-header {
      background: linear-gradient(135deg, var(--header-from), var(--header-to));
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .menu-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 16px;
      color: #fff;
      display: none;
    }

    @media (max-width: 600px) { .menu-btn { display: block; } }

    .avatar {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      font-weight: 700;
      color: #fff;
    }

    .header-info { flex: 1; }
    .header-info h1 { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .header-info p { font-size: 10px; color: var(--powered); margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .theme-toggle {
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 8px;
      padding: 6px 9px;
      cursor: pointer;
      font-size: 15px;
      transition: background 0.2s;
      margin-right: 4px;
    }

    .theme-toggle:hover { background: rgba(255,255,255,0.25); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
      transition: background 0.3s;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--header-from); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--placeholder);
      font-size: 14px;
    }

    .empty-state .icon { font-size: 36px; }

    .message {
      display: flex;
      gap: 8px;
      max-width: 88%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
      font-weight: 700;
    }

    .message.ai .msg-avatar { background: linear-gradient(135deg, var(--header-from), var(--header-to)); color: #fff; }
    .message.user .msg-avatar { background: linear-gradient(135deg, #60c0ff, #4fa3e0); color: #fff; }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.ai .msg-bubble {
      background: var(--msg-ai-bg);
      border: 1px solid var(--msg-ai-border);
      color: var(--msg-ai-color);
      border-bottom-left-radius: 4px;
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, var(--msg-user-from), var(--msg-user-to));
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .typing-indicator { display: flex; gap: 5px; padding: 2px 0; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--header-from);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2){animation-delay:0.2s}
    .typing-indicator span:nth-child(3){animation-delay:0.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

    .chat-input-area {
      padding: 12px 14px;
      background: var(--input-area-bg);
      border-top: 1px solid var(--input-border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      transition: background 0.3s;
      flex-shrink: 0;
    }

    #userInput {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 10px 14px;
      color: var(--input-color);
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      font-family: inherit;
      transition: border-color 0.2s, background 0.3s;
    }

    #userInput:focus { border-color: var(--header-from); }
    #userInput::placeholder { color: var(--placeholder); }

    #sendBtn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--send-from), var(--send-to));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
      color: #fff;
    }

    #sendBtn:hover { transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-bubble { background: #ff4444 !important; border: none !important; color: #fff !important; }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 99;
    }
    .overlay.show { display: block; }
  </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app-wrapper">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Riwayat Chat</span>
      <button class="new-chat-btn" onclick="newChat()">+ Chat Baru</button>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-footer">g.ai • powered by groq</div>
  </div>

  <!-- MAIN -->
  <div class="chat-container">
    <div class="chat-header">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="avatar">g</div>
      <div class="header-info">
        <h1>g.ai</h1>
        <p>powered by groq</p>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      <div class="status-dot"></div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input-area">
      <textarea id="userInput" rows="1" placeholder="Ketik pesan..."></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const chatList = document.getElementById('chatList');

  let sessions = JSON.parse(localStorage.getItem('gai_sessions') || '[]');
  let currentId = null;

  // ── Init ──
  if (sessions.length > 0) {
    loadSession(sessions[0].id);
  } else {
    newChat();
  }
  renderSidebar();

  // ── Session helpers ──
  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function getSession(id) { return sessions.find(s => s.id === id); }

  function saveAll() { localStorage.setItem('gai_sessions', JSON.stringify(sessions)); }

  function newChat() {
    const id = genId();
    sessions.unshift({ id, title: 'Chat Baru', date: new Date().toLocaleDateString('id-ID'), messages: [] });
    saveAll();
    loadSession(id);
    renderSidebar();
    closeSidebar();
  }

  function loadSession(id) {
    currentId = id;
    const s = getSession(id);
    chatMessages.innerHTML = '';
    if (!s || s.messages.length === 0) {
      showEmpty();
    } else {
      s.messages.forEach(m => renderMessage(m.role, m.content));
    }
    renderSidebar();
  }

  function showEmpty() {
    chatMessages.innerHTML = `
      <div class="empty-state">
        <div class="icon">✦</div>
        <div>Mulai percakapan baru!</div>
      </div>`;
  }

  function deleteSession(id, e) {
    e.stopPropagation();
    sessions = sessions.filter(s => s.id !== id);
    saveAll();
    if (currentId === id) {
      if (sessions.length > 0) loadSession(sessions[0].id);
      else newChat();
    }
    renderSidebar();
  }

  function renderSidebar() {
    chatList.innerHTML = '';
    if (sessions.length === 0) {
      chatList.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--placeholder);text-align:center">Belum ada riwayat</div>';
      return;
    }
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'chat-item' + (s.id === currentId ? ' active' : '');
      item.onclick = () => { loadSession(s.id); closeSidebar(); };
      item.innerHTML = `
        <div class="chat-item-info">
          <div class="chat-item-title">${s.title}</div>
          <div class="chat-item-date">${s.date}</div>
        </div>
        <button class="delete-btn" title="Hapus">🗑</button>`;
      item.querySelector('.delete-btn').onclick = (e) => deleteSession(s.id, e);
      chatList.appendChild(item);
    });
  }

  // ── Render message ──
  function renderMessage(role, text, isError = false) {
    // Hapus empty state kalau ada
    const empty = chatMessages.querySelector('.empty-state');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'ai' ? 'g' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isError ? ' error-bubble' : '');
    bubble.textContent = text;

    msg.appendChild(av);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai'; msg.id = 'typingIndicator';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = 'g';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    msg.appendChild(av); msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  // ── Send ──
  userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    const s = getSession(currentId);
    if (!s) return;

    renderMessage('user', text);
    s.messages.push({ role: 'user', content: text });

    // Update judul otomatis dari pesan pertama
    if (s.messages.length === 1) {
      s.title = text.length > 30 ? text.slice(0, 30) + '…' : text;
      renderSidebar();
    }

    saveAll();
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: s.messages })
      });

      const data = await res.json();
      removeTyping();

      if (data.content?.[0]) {
        const reply = data.content[0].text;
        renderMessage('ai', reply);
        s.messages.push({ role: 'assistant', content: reply });
        saveAll();
      } else {
        renderMessage('ai', 'Maaf, terjadi kesalahan. Coba lagi ya!', true);
      }
    } catch {
      removeTyping();
      renderMessage('ai', 'Gagal terhubung. Periksa koneksi internet.', true);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  // ── Theme ──
  function toggleTheme() {
    const html = document.documentElement;
    const btn = document.querySelector('.theme-toggle');
    if (html.getAttribute('data-theme') === 'light') {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = '☀️';
      localStorage.setItem('gai_theme', 'dark');
    } else {
      html.setAttribute('data-theme', 'light');
      btn.textContent = '🌙';
      localStorage.setItem('gai_theme', 'light');
    }
  }

  // Load saved theme
  const savedTheme = localStorage.getItem('gai_theme');
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.querySelector('.theme-toggle').textContent = '☀️';
  }

  // ── Mobile sidebar ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
</script>

</body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>

      <h1>AI Assistant</h1>
      <p>Powered by Claude API</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message ai">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">

      </div>

  </div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  // Simpan history percakapan
  let conversationHistory = [];

  // Auto resize textarea
  userInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Kirim dengan Enter (Shift+Enter untuk baris baru)
  userInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text, isError = false) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'ai' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isError ? ' error-bubble' : '');
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return bubble;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // Tampilkan pesan user
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const aiReply = data.content[0].text;
        addMessage('ai', aiReply);
        conversationHistory.push({ role: 'assistant', content: aiReply });
      } else {
        addMessage('ai', 'Maaf, terjadi kesalahan. Coba lagi ya!', true);
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', 'Gagal terhubung ke API. Periksa koneksi internet kamu.', true);
      console.error(err);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>

</body>
</html>
