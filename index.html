<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chat App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: #1a1a2e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
    }

    .chat-header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    .chat-header h1 { font-size: 18px; font-weight: 600; }
    .chat-header p { font-size: 12px; opacity: 0.8; }

    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-left: auto;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 4px; }

    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.ai .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .message.user .msg-avatar { background: linear-gradient(135deg, #0ea5e9, #06b6d4); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }

    .message.ai .msg-bubble {
      background: #16213e;
      border: 1px solid #6366f133;
      border-bottom-left-radius: 4px;
    }

    .message.user .msg-bubble {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-bottom-right-radius: 4px;
      color: white;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .chat-input-area {
      padding: 16px 20px;
      background: #16213e;
      border-top: 1px solid #6366f122;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #userInput {
      flex: 1;
      background: #0f0f1a;
      border: 1px solid #6366f144;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    #userInput:focus { border-color: #6366f1; }
    #userInput::placeholder { color: #555; }

    #sendBtn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      transition: transform 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover { transform: scale(1.05); }
    #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .welcome-msg {
      text-align: center;
      color: #555;
      font-size: 13px;
      margin-top: auto;
      padding: 20px;
    }

    .error-bubble {
      background: #ff4444 !important;
      border: none !important;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <h1>AI Assistant</h1>
      <p>Powered by Claude API</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message ai">
      <div class="msg-avatar">🤖</div>
      <div class="msg-bubble">
        Halo! Saya adalah AI Assistant. Ada yang bisa saya bantu? 😊
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <textarea id="userInput" rows="1" placeholder="Ketik pesan..."></textarea>
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  // Simpan history percakapan
  let conversationHistory = [];

  // Auto resize textarea
  userInput.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  // Kirim dengan Enter (Shift+Enter untuk baris baru)
  userInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text, isError = false) {
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'ai' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble' + (isError ? ' error-bubble' : '');
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    return bubble;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message ai';
    msg.id = 'typingIndicator';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // Tampilkan pesan user
    addMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      if (data.content && data.content[0]) {
        const aiReply = data.content[0].text;
        addMessage('ai', aiReply);
        conversationHistory.push({ role: 'assistant', content: aiReply });
      } else {
        addMessage('ai', 'Maaf, terjadi kesalahan. Coba lagi ya!', true);
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', 'Gagal terhubung ke API. Periksa koneksi internet kamu.', true);
      console.error(err);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }
</script>

</body>
</html>
